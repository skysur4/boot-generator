[versions]
swagger = '2.8.16'
guava =  '33.5.0-jre'
uuidgenerator = '5.2.0'
mybatis = '3.5.19'
springmybatis = '4.0.1'
freemarker = '2.3.34'

[libraries]
google-guava = { module = "com.google.guava:guava", version.ref = "guava" }
uuid-generator = { module = "com.fasterxml.uuid:java-uuid-generator", version.ref = "uuidgenerator" }
swagger-mvc = { module = "org.springdoc:springdoc-openapi-starter-webmvc-ui", version.ref = "swagger" }
mybatis = { module = "org.mybatis:mybatis", version.ref = "mybatis" }
mybatis-starter = { module = "org.mybatis.spring.boot:mybatis-spring-boot-starter", version.ref = "springmybatis" }
apache-freemarker = { module = "org.freemarker:freemarker", version.ref = "freemarker" }
